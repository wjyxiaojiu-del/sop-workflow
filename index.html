<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 工作流</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 自定义标题栏 -->
  <div class="titlebar">
    <div class="titlebar-drag">
      <svg class="titlebar-logo" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="titlebar-title">SOP 工作流</span>
    </div>
    <div class="titlebar-controls">
      <button class="titlebar-btn" id="btn-minimize"><svg width="12" height="12" viewBox="0 0 12 12"><line x1="1" y1="6" x2="11" y2="6" stroke="currentColor" stroke-width="1.5"/></svg></button>
      <button class="titlebar-btn" id="btn-maximize"><svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.3"/></svg></button>
      <button class="titlebar-btn btn-close" id="btn-close"><svg width="12" height="12" viewBox="0 0 12 12"><line x1="2" y1="2" x2="10" y2="10" stroke="currentColor" stroke-width="1.5"/><line x1="10" y1="2" x2="2" y2="10" stroke="currentColor" stroke-width="1.5"/></svg></button>
    </div>
  </div>

  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <nav class="sidebar-nav">
        <button class="nav-item active" data-view="templates">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          <span>模板库</span>
        </button>
        <button class="nav-item" data-view="instances">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>执行中</span>
          <span class="badge" id="running-badge" style="display:none">0</span>
        </button>
        <button class="nav-item" data-view="history">
          <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
          <span>历史记录</span>
        </button>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-new-sop" id="btn-new-template">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          新建 SOP 模板
        </button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 模板库视图 -->
      <div class="view active" id="view-templates">
        <div class="view-header">
          <h1>SOP 模板库</h1>
          <div class="search-box">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="search-templates" placeholder="搜索模板...">
          </div>
        </div>
        <div class="template-grid" id="template-grid">
          <div class="empty-state" id="templates-empty">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg>
            <p>还没有 SOP 模板</p>
            <p class="empty-hint">点击下方按钮开始创建你的第一个 SOP</p>
          </div>
        </div>
      </div>

      <!-- 执行中视图 -->
      <div class="view" id="view-instances">
        <div class="view-header">
          <h1>执行中的 SOP</h1>
        </div>
        <div class="instances-list" id="instances-list">
          <div class="empty-state" id="instances-empty">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <p>没有正在执行的 SOP</p>
            <p class="empty-hint">从模板库中选择一个模板开始执行</p>
          </div>
        </div>
      </div>

      <!-- 历史记录视图 -->
      <div class="view" id="view-history">
        <div class="view-header">
          <h1>历史记录</h1>
        </div>
        <div class="history-list" id="history-list">
          <div class="empty-state" id="history-empty">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-tertiary)" stroke-width="1.2"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
            <p>暂无历史记录</p>
          </div>
        </div>
      </div>

      <!-- 模板详情/编辑视图 -->
      <div class="view" id="view-template-detail">
        <div class="view-header">
          <button class="btn-back" id="btn-back-templates">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            返回
          </button>
          <div class="detail-actions">
            <div class="view-toggle" id="detail-view-toggle">
              <button class="toggle-btn active" data-mode="list">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
              <button class="toggle-btn" data-mode="flow">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><circle cx="12" cy="19" r="3"/><line x1="12" y1="8" x2="12" y2="16"/></svg>
              </button>
            </div>
            <button class="btn-secondary" id="btn-edit-template">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              编辑
            </button>
            <button class="btn-primary" id="btn-start-instance">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              开始执行
            </button>
            <button class="btn-danger" id="btn-delete-template">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              删除
            </button>
          </div>
        </div>
        <div class="template-detail" id="template-detail"></div>
      </div>

      <!-- 执行详情视图 -->
      <div class="view" id="view-instance-detail">
        <div class="view-header">
          <button class="btn-back" id="btn-back-instances">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            返回
          </button>
          <div class="detail-actions">
            <button class="btn-primary" id="btn-finish-instance">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
              完成
            </button>
            <button class="btn-danger" id="btn-abandon-instance">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              放弃
            </button>
          </div>
        </div>
        <div class="instance-detail" id="instance-detail"></div>
      </div>
    </main>
  </div>

  <!-- 新建/编辑模板弹窗 -->
  <div class="modal-overlay" id="modal-template" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-template-title">新建 SOP 模板</h3>
        <button class="modal-close" id="modal-template-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>模板名称</label>
          <input type="text" id="input-template-name" placeholder="例如：服务器部署流程">
        </div>
        <div class="form-group">
          <label>描述</label>
          <textarea id="input-template-desc" placeholder="简要描述这个 SOP 的用途..." rows="2"></textarea>
        </div>
        <div class="form-group">
          <label>步骤列表</label>
          <div class="steps-editor" id="steps-editor"></div>
          <button class="btn-add-step" id="btn-add-step">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            添加步骤
          </button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-template">取消</button>
        <button class="btn-primary" id="btn-save-template">保存</button>
      </div>
    </div>
  </div>

  <!-- 变量填写弹窗 -->
  <div class="modal-overlay" id="modal-variables" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>填写变量</h3>
        <button class="modal-close" id="modal-variables-close">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="variables-form"></div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-cancel-variables">取消</button>
        <button class="btn-primary" id="btn-confirm-variables">开始执行</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
